name: iOS Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build BinPeek
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          xcrun simctl list devices available
          xcodebuild \
            -project BinPeek.xcodeproj \
            -scheme BinPeek \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build
