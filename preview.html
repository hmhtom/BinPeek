<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BinPeek Preview</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #f2f2f7;
      color: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .previews {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 390px));
      gap: 24px;
      align-items: start;
      width: min(100%, 1260px);
    }

    .phone {
      height: 844px;
      border: 12px solid #111111;
      border-radius: 44px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
    }

    .screen {
      height: 100%;
      padding: 58px 16px 24px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
    }

    .title {
      margin: 0 0 28px;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .heading {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 600;
    }

    .line {
      margin: 0;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 400;
    }

    .form {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      width: 100%;
      min-height: 44px;
      border: 1px solid #c7c7cc;
      border-radius: 8px;
      padding: 11px 12px;
      color: #8e8e93;
      font-size: 17px;
      background: #ffffff;
    }

    .button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 13px 16px;
      background: #007aff;
      color: #ffffff;
      font-size: 17px;
      font-weight: 600;
      text-align: center;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .group {
      overflow: hidden;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid #e5e5ea;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      padding: 0 14px;
      font-size: 17px;
      border-bottom: 1px solid #e5e5ea;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .value {
      color: #8e8e93;
    }

    @media (max-width: 980px) {
      .previews {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .phone {
        width: min(390px, 100%);
      }
    }
  </style>
</head>
<body>
  <main class="previews" aria-label="BinPeek page previews">
    <section class="phone" aria-label="Home preview">
      <div class="screen">
        <h1 class="title">BinPeek</h1>

        <div class="content">
          <section class="section">
            <h2 class="heading">Tonight:</h2>
            <p class="line">🟩 Green Bin</p>
            <p class="line">🟦 Recycling</p>
          </section>

          <section class="section">
            <h2 class="heading">Tomorrow:</h2>
            <p class="line">Pickup Day</p>
          </section>
        </div>
      </div>
    </section>

    <section class="phone" aria-label="Address preview">
      <div class="screen">
        <h1 class="title">Address</h1>

        <div class="form">
          <div class="field">12</div>
          <div class="field">Maple Street</div>
          <div class="field">A1A 1A1</div>
          <div style="flex: 1"></div>
          <div class="button">Save Address</div>
        </div>
      </div>
    </section>

    <section class="phone" aria-label="Settings preview">
      <div class="screen">
        <h1 class="title">Settings</h1>

        <div class="list">
          <section class="group">
            <div class="row">
              <span>Reminder Time</span>
              <span class="value">8:00 PM</span>
            </div>
            <div class="row">
              <span>Theme</span>
              <span class="value">System</span>
            </div>
          </section>

          <section class="group">
            <div class="row">
              <span>Version</span>
              <span class="value">1.0</span>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
